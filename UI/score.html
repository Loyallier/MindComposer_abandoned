<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MELODY AI — Score Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.7.7/build/opensheetmusicdisplay.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; color: #e9f1ff; background: radial-gradient(1200px 800px at 20% 10%, #071330 0%, #0a1430 40%, #060c1c 100%); overflow: hidden; cursor: none; }
      .stage { position: relative; min-height: 100vh; display: grid; grid-template-rows: auto 1fr; align-items: start; justify-items: center; padding: 10vh 6vw; }
      .title { text-align: center; margin-top: 2vh; z-index: 2; }
      .title h1 { margin: 0; font-weight: 800; letter-spacing: 0.06em; font-size: clamp(36px, 6vw, 72px); line-height: 1.05; background: linear-gradient(90deg, #3cf2d4, #4cc3ff 40%, #bc42ff); -webkit-background-clip: text; background-clip: text; color: transparent; filter: drop-shadow(0 0 10px rgba(76,195,255,0.35)) drop-shadow(0 0 20px rgba(116,92,255,0.28)); }
      .panel { width: clamp(360px, 64vw, 960px); padding: 28px 28px 28px; border-radius: 22px; background: linear-gradient(180deg, #10224a 0%, #0c1e3f 52%), radial-gradient(120% 90% at 0% 0%, rgba(84,255,232,0.12) 0%, rgba(225,123,255,0.12) 100%); background-blend-mode: screen; box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 18px 42px rgba(76,195,255,0.12); position: relative; z-index: 2; }
      .label { text-align: center; font-size: clamp(16px, 2.4vw, 22px); letter-spacing: 0.02em; color: #cfe6ff; opacity: 0.92; margin-bottom: 18px; }
      .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 18px; }
      .btn { height: 46px; border-radius: 16px; border: none; outline: none; cursor: none; font-weight: 700; letter-spacing: 0.12em; font-size: 14px; color: #d5e9ff; background: linear-gradient(180deg, #142440, #0f1d36); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 30px rgba(76, 195, 255, 0.16); display: flex; align-items: center; justify-content: center; gap: 10px; }
      .btn:disabled { opacity: 0.6; cursor: none; }
      .viewer { background: linear-gradient(180deg, #0f1b34, #0a1428); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
      .viewer iframe { width: 100%; height: clamp(280px, 48vh, 540px); border: none; background: #0c1732; cursor: none; }
      .viewer #osmd { width: 100%; height: clamp(280px, 48vh, 540px); overflow: auto; padding: 12px; cursor: none; }
      .viewer svg { cursor: none; }
      .fallback { display: none; margin: 0; padding: 16px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 13px; line-height: 1.5; white-space: pre-wrap; color: #d5e9ff; }
      .note { margin-top: 10px; font-size: 12px; letter-spacing: 0.06em; color: #9cc4ff; opacity: 0.85; text-align: center; }
      .waves { position: absolute; inset: 0; z-index: 0; opacity: 0.75; }
      svg.waves { width: 100%; height: 100%; }
      .cursorNote { position: fixed; left: 0; top: 0; width: 28px; height: 28px; pointer-events: none; z-index: 2; transform: translate3d(0, 0, 0) rotate(-12deg); will-change: transform, opacity; filter: drop-shadow(0 0 12px rgba(76,195,255,0.85)) drop-shadow(0 0 24px rgba(76,195,255,0.55)) drop-shadow(0 0 48px rgba(76,195,255,0.35)); mix-blend-mode: normal; overflow: visible; opacity: 0; animation: cursorIn 0.6s ease-out 0.9s both; }
      @keyframes cursorIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="title"><h1>MELODY AI</h1></section>
      <section class="panel">
        <div id="label" class="label">Score Preview</div>
        <div class="actions">
          <button id="back" class="btn">Back to Player</button>
          <button id="openTab" class="btn">Open in New Tab</button>
          <button id="download" class="btn">Download Score</button>
        </div>
        <div class="viewer">
          <iframe id="viewer" title="Score Preview" aria-label="Score Preview"></iframe>
          <pre id="fallback" class="fallback" aria-label="Score Text"></pre>
          <div id="osmd" aria-label="Rendered Score" style="display:none"></div>
        </div>
        <div id="note" class="note">If the preview doesn't load, try "Open in New Tab" or "Download".</div>
      </section>
      <svg class="waves" viewBox="0 0 3600 1000" preserveAspectRatio="none" aria-hidden="true" shape-rendering="optimizeSpeed">
        <defs id="grads"></defs>
        <g id="waveGroup" fill="none" stroke-width="1.6" opacity="0.75" stroke-linecap="round"></g>
      </svg>
    </main>
    <script>
      const qp = new URLSearchParams(location.search);
      const mode = qp.get('mode') || sessionStorage.getItem('mode') || 'melody';
      const scoreUrl = qp.get('score') || sessionStorage.getItem('resultScoreUrl') || sessionStorage.getItem('musicxmlUrl') || sessionStorage.getItem('midiUrl') || '';
      const label = document.getElementById('label');
      const viewer = document.getElementById('viewer');
      const fallback = document.getElementById('fallback');
      const backBtn = document.getElementById('back');
      const openBtn = document.getElementById('openTab');
      const dlBtn = document.getElementById('download');

      if (!scoreUrl) {
        label.textContent = 'No score available.';
        viewer.style.display = 'none';
        fallback.style.display = 'none';
        openBtn.disabled = true; dlBtn.disabled = true;
      } else {
        openBtn.disabled = false; dlBtn.disabled = false;
        const isXML = scoreUrl.endsWith('.xml') || scoreUrl.endsWith('.musicxml') || scoreUrl.endsWith('.mxl');
        if (isXML && window.opensheetmusicdisplay && opensheetmusicdisplay.OpenSheetMusicDisplay) {
          const osmdDiv = document.getElementById('osmd');
          osmdDiv.style.display = 'block';
          viewer.style.display = 'none';
          fallback.style.display = 'none';
          (async () => {
            try {
              const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(osmdDiv, { autoResize: true, backend: 'svg' });
              await osmd.load(scoreUrl);
              osmd.render();
            } catch (e) {
              viewer.src = scoreUrl;
              osmdDiv.style.display = 'none';
              viewer.style.display = 'block';
            }
          })();
        } else {
          viewer.src = scoreUrl;
          viewer.style.display = 'block';
          document.getElementById('osmd').style.display = 'none';
        }
      }

      backBtn.addEventListener('click', () => { window.location.href = `play.html?mode=${mode}`; });
      openBtn.addEventListener('click', () => { if (!scoreUrl) return; window.open(scoreUrl, '_blank', 'noopener'); });
      dlBtn.addEventListener('click', () => {
        if (!scoreUrl) return;
        const a = document.createElement('a');
        a.href = scoreUrl;
        a.download = (sessionStorage.getItem('pendingName') || 'score') + (scoreUrl.endsWith('.xml') || scoreUrl.endsWith('.musicxml') ? '.musicxml' : (scoreUrl.endsWith('.mid') ? '.mid' : ''));
        a.style.display = 'none';
        a.style.cursor = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
      });

      const svg = document.querySelector('svg.waves');
      const group = svg.querySelector('#waveGroup');
      const defs = svg.querySelector('#grads');
      const svgNS = 'http://www.w3.org/2000/svg';
      const width = 3600;
      const FREQ = Math.PI * 6;
      function makeBasis(segs) { const step = width / segs; const xs = []; const sinA = [], cosA = []; const sinA2 = [], cosA2 = []; const sinB = [], cosB = []; for (let x = step; x <= width; x += step) { const tn = x / width; xs.push(x); const a = tn * FREQ; sinA.push(Math.sin(a)); cosA.push(Math.cos(a)); const a2 = tn * FREQ * 2.2; sinA2.push(Math.sin(a2)); cosA2.push(Math.cos(a2)); const b = tn * 2.9; sinB.push(Math.sin(b)); cosB.push(Math.cos(b)); } return { xs, sinA, cosA, sinA2, cosA2, sinB, cosB }; }
      const bases = { 120: makeBasis(120), 160: makeBasis(160), 220: makeBasis(220) };
      group.setAttribute('transform', 'rotate(-30 1800 500)');
      const lines = 56;
      const spacing = 84;
      const baseY = -760;
      const paths = [];
      for (let i = 0; i < lines; i++) { const p = document.createElementNS(svgNS, 'path'); const grad = document.createElementNS(svgNS, 'linearGradient'); grad.setAttribute('id', `grad${i}`); grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%'); grad.setAttribute('x2', '100%'); grad.setAttribute('y2', '0%'); const colors = [ `hsl(${190 + i * 5}, 100%, 62%)`, `hsl(${220 + i * 5}, 100%, 60%)`, `hsl(${260 + i * 5}, 100%, 62%)`, `hsl(${300 + i * 5}, 100%, 66%)` ]; const offsets = ['0%', '35%', '70%', '100%']; for (let s = 0; s < colors.length; s++) { const stop = document.createElementNS(svgNS, 'stop'); stop.setAttribute('offset', offsets[s]); stop.setAttribute('stop-color', colors[s]); grad.appendChild(stop); } defs.appendChild(grad); p.setAttribute('stroke', `url(#grad${i})`); p.setAttribute('stroke-width', '2.0'); p.setAttribute('opacity', '0.60'); group.appendChild(p); paths.push(p); }
      let t = 0; let lastFrameTime = performance.now(); let avgDt = 16;
      function animate() { if (document.hidden) { requestAnimationFrame(animate); return; } const now = performance.now(); const dt = Math.max(8, now - lastFrameTime); lastFrameTime = now; avgDt = avgDt * 0.9 + dt * 0.1; const fps = 1000 / avgDt; t += 0.014; const ampWanted = spacing * 1.10 + spacing * 0.18 * Math.sin(t * 0.14); const amp = Math.min(spacing * 0.55, ampWanted); const segs = fps < 35 ? 120 : (fps < 50 ? 160 : 220); const basis = bases[segs]; const rippleScale = fps < 45 ? 0.12 : 0.18; const groupOffset = spacing * 0.085 * Math.sin(t * 0.46); const phase = t * 0.58; const sinPH = Math.sin(phase); const cosPH = Math.cos(phase); const sinPH11 = Math.sin(phase * 1.1); const cosPH11 = Math.cos(phase * 1.1); const sinPH06 = Math.sin(phase * 0.6); const cosPH06 = Math.cos(phase * 0.6); const ampLine = amp; for (let i = 0; i < lines; i++) { const y0 = baseY + i * spacing + groupOffset; paths[i].setAttribute('d', buildPath(y0, ampLine, sinPH, cosPH, sinPH11, cosPH11, sinPH06, cosPH06, basis, rippleScale)); } requestAnimationFrame(animate); }
      function buildPath(y0, amp, sinPH, cosPH, sinPH11, cosPH11, sinPH06, cosPH06, basis, rippleScale) { const parts = []; parts.push(`M0,${y0 + amp * sinPH}`); for (let i = 0; i < basis.xs.length; i++) { const major = amp * (basis.sinA[i] * cosPH + basis.cosA[i] * sinPH); const sA2c = basis.sinA2[i] * cosPH11 + basis.cosA2[i] * sinPH11; const cBc = basis.cosB[i] * cosPH06 - basis.sinB[i] * sinPH06; const ripple = rippleScale * amp * sA2c * cBc; const y = y0 + major + ripple; parts.push(` L${basis.xs[i]},${y}`); } return parts.join(''); }
      animate();
      const cursorNote = document.createElement('div');
      cursorNote.className = 'cursorNote';
      document.body.appendChild(cursorNote);
      const noteSvg = document.createElementNS(svgNS, 'svg');
      noteSvg.setAttribute('viewBox', '-24 -36 96 192');
      noteSvg.setAttribute('width', '28');
      noteSvg.setAttribute('height', '28');
      noteSvg.style.overflow = 'visible';
      const noteText = document.createElementNS(svgNS, 'text');
      noteText.setAttribute('x', '24');
      noteText.setAttribute('y', '48');
      noteText.setAttribute('text-anchor', 'middle');
      noteText.setAttribute('dominant-baseline', 'middle');
      noteText.setAttribute('font-family', '"Noto Music", serif');
      noteText.setAttribute('font-size', '96');
      noteText.setAttribute('paint-order', 'stroke fill');
      noteText.setAttribute('stroke-width', '2');
      noteText.textContent = '\uD834\uDD1E';
      noteSvg.appendChild(noteText);
      cursorNote.appendChild(noteSvg);
      let cx = innerWidth / 2, cy = innerHeight / 2;
      let tx = cx, ty = cy;
      let prevX = tx, prevY = ty, prevTime = performance.now();
      let speedScale = 0;
      const half = 14;
      function trackCursor() {
        const now = performance.now();
        const dt = Math.max(16, now - prevTime);
        const dx = tx - prevX; const dy = ty - prevY;
        const v = Math.sqrt(dx * dx + dy * dy) / dt;
        speedScale = Math.min(1, v * 2);
        prevX = tx; prevY = ty; prevTime = now;
        cx += (tx - cx) * 0.22;
        cy += (ty - cy) * 0.22;
        cursorNote.style.transform = `translate3d(${(cx - half).toFixed(2)}px, ${(cy - half).toFixed(2)}px, 0) rotate(-12deg)`;
        noteText.setAttribute('fill', 'rgb(80,245,255)');
        noteText.setAttribute('stroke', 'rgb(255,255,255)');
        requestAnimationFrame(trackCursor);
      }
      window.addEventListener('pointermove', (e) => { tx = e.clientX; ty = e.clientY; }, { passive: true });
      trackCursor();
    </script>
  </body>
</html>
